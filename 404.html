<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — CraftyForms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F7F6F3;
      --ink:      #161614;
      --muted:    #6B6A65;
      --faint:    #9B9A95;
      --accent:   #C8451B;
      --border:   #E3E2DD;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 28px;
    }

    nav {
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      height: 58px;
    }

    .logo {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ink);
      text-decoration: none;
    }

    .logo-dot { color: var(--accent); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 28px;
    }

    .content {
      text-align: center;
      max-width: 400px;
    }

    .code {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--border);
      padding: 11px 22px;
      border-radius: 6px;
      text-decoration: none;
      transition: border-color 0.12s;
    }

    .btn:hover { border-color: var(--muted); }

    footer {
      border-top: 1px solid var(--border);
      padding: 28px 0;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-copy { font-size: 13px; color: var(--faint); }

    .footer-links { display: flex; gap: 20px; }

    .footer-links a {
      font-size: 13px;
      color: var(--faint);
      text-decoration: none;
      transition: color 0.12s;
    }

    .footer-links a:hover { color: var(--muted); }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <div class="nav-inner">
        <a href="/" class="logo">Crafty<span class="logo-dot">Forms</span></a>
      </div>
    </div>
  </nav>

  <main>
    <div class="content">
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>This page doesn't exist or may have moved. Head back to the homepage.</p>
      <a href="/" class="btn">Back to home</a>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span class="footer-copy">&copy; 2026 CraftyForms. All rights reserved.</span>
        <div class="footer-links">
          <a href="privacy.html">Privacy</a>
          <a href="terms.html">Terms</a>
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
